<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ari</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'DM Sans', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 60px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.35);
      margin-bottom: 20px;
      box-shadow: 0 0 32px rgba(59,130,246,0.2);
      overflow: hidden;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #fff;
      margin-bottom: 6px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.28);
      color: #60a5fa;
      font-size: 0.78rem;
      font-weight: 500;
    }

    .bio {
      color: #8892a4;
      font-size: 0.88rem;
      margin-bottom: 40px;
      letter-spacing: 0.3px;
      text-align: center;
    }

    .born {
      color: #8892a4;
      font-size: 0.82rem;
      margin-top: 6px;
      text-align: center;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,0.25), transparent);
      margin-bottom: 32px;
    }

    .section-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #3b82f6;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    .cards {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 40px;
    }

    .card {
      width: 100%;
      background: #13131f;
      border: 1px solid rgba(59,130,246,0.14);
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
      cursor: pointer;
    }

    .card:hover {
      border-color: rgba(59,130,246,0.45);
      background: rgba(59,130,246,0.06);
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(88,101,242,0.15);
      border: 1px solid rgba(88,101,242,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-title {
      font-weight: 500;
      font-size: 0.9rem;
      color: #e2e8f0;
      margin-bottom: 2px;
    }

    .card-copy {
      color: #60a5fa;
      font-size: 0.82rem;
    }

    .card-arrow {
      color: #3b5a8a;
      font-size: 0.75rem;
    }

    footer {
      color: #2d3a4f;
      font-size: 0.75rem;
      margin-top: 20px;
    }

    footer span {
      color: #3b82f6;
    }
  </style>
</head>
<body>

<main>

  <div class="avatar">
    <img src="pf.jpg" alt="Ari">
  </div>

  <h1>Ari</h1>

  <div class="badges" style="margin-top:10px;">
    <span class="badge">Cyber Security Specialist</span>
    <span class="badge">Full Stack Developer</span>
  </div>

  <p class="born">December 2003 · The best in the world </p>

  <p class="bio" style="margin-top:10px;">
    
  </p>

  <div class="divider"></div>

  <div class="section-label">My Accounts</div>

  <div class="cards">

          <div class="card-title">Discord</div>
          <div class="card-copy">0ar1</div>
        </div>
      </div>
      <div class="card-arrow">copy</div>
    </div>

  </div>

  <footer>made by <span>Ari</span> · 2025</footer>

</main>

</body>
</html>
